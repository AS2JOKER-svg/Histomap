name: Deploy to GitHub Pages

on:
  push:
    branches: 'main' # ⚠️ Vérifie si ta branche s'appelle 'main' ou 'master' et ajuste ici

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: front/package.json # Indique où est ton package.json

      - name: Installation des dépendances
        run: npm install
        working-directory: front

      - name: Génération des données (Scripts mjs)
        run: node scripts/build-epochs.mjs
        working-directory: front

      - name: Compilation du site React (Build)
        run: npm run build
        working-directory: front

      - name: Téléchargement de l'artéfact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'front/dist' # Le dossier contenant l'application finale compilée

      - name: Déploiement sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4